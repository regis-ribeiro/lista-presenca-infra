apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: lista-presenca-ingress
  namespace: default
  annotations:
    # Essa anotação garante que requisições grandes (como envio de arquivos) não sejam bloqueadas
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
spec:
  ingressClassName: nginx
  rules:
  - host: lista.local
    http:
      paths:
      # 1. Rota da API (Tudo que começar com /api vai para o Java no Raspberry Pi Zero)
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: lista-presenca-backend
            port:
              number: 8080
              
      # 2. Rota do Frontend (O restante do tráfego vai para a interface web)
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-service
            port:
              number: 80
