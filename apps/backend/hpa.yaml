apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: lista-presenca-backend-hpa
  namespace: default
spec:
  # 1. QUEM o HPA vai vigiar e escalar?
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: lista-presenca-backend
  
  # 2. OS LIMITES da sua infraestrutura
  minReplicas: 2  # Nunca tenha menos que 2 (Garante Alta Disponibilidade)
  maxReplicas: 4  # Nunca tenha mais que 4 (Impede de esgotar os seus 4 Pi Zeros)
  
  # 3. O GATILHO (Quando escalar?)
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 50 # Se a média de uso de CPU passar de 50%, ligue mais pods!